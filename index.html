<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>GameVault</h2>
            <nav>
                <a href="#overview">Dashboard</a>
                <a href="#controls">Controls</a>
                <a href="#inventory">Inventory</a>
                <a href="#search">Search</a>
                <a href="#logs">Logs</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar" id="overview">
                <h1>Game Store Inventory Dashboard</h1>
                <p>Track games, accessories, snacks, and stock levels</p>
            </header>

            <section class="stats">
                <div class="card stat-card">
                    <h3>Total Products</h3>
                    <p id="productCount">0</p>
                </div>
                <div class="card stat-card">
                    <h3>Inventory Value Before</h3>
                    <p id="beforeValue">$0.00</p>
                </div>
                <div class="card stat-card">
                    <h3>Inventory Value After</h3>
                    <p id="afterValue">$0.00</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
